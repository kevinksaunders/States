<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>License Plate Game</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@300;400;600&display=swap');

  :root {
    --bg: #1a1a2e;
    --panel: #16213e;
    --accent: #e94560;
    --gold: #f5a623;
    --green: #0f9b58;
    --text: #eaeaea;
    --muted: #6b7280;
    --plate-bg: #fef08a;
    --plate-border: #1e3a5f;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Oswald', sans-serif;
    min-height: 100vh;
    padding: 16px;
    background-image: radial-gradient(ellipse at top, #0f3460 0%, #1a1a2e 60%);
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.4rem;
    letter-spacing: 4px;
    text-align: center;
    color: var(--gold);
    text-shadow: 0 0 20px rgba(245,166,35,0.4);
    margin-bottom: 4px;
  }

  .subtitle {
    text-align: center;
    color: var(--muted);
    font-size: 0.85rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-bottom: 20px;
    padding: 12px;
    background: var(--panel);
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.05);
  }

  .stat { text-align: center; }

  .stat-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    line-height: 1;
  }

  .stat-num.remaining { color: var(--gold); }
  .stat-num.found { color: var(--green); }

  .stat-label {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* Voice input area */
  .voice-section {
    margin-bottom: 16px;
  }

  .voice-label {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
    text-align: center;
  }

  .input-row {
    display: flex;
    gap: 8px;
  }

  #cmdInput {
    flex: 1;
    background: var(--panel);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Oswald', sans-serif;
    font-size: 1rem;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  #cmdInput:focus {
    border-color: var(--accent);
  }

  #cmdInput::placeholder {
    color: var(--muted);
    font-size: 0.9rem;
  }

  #goBtn {
    background: var(--accent);
    border: none;
    border-radius: 10px;
    color: white;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    letter-spacing: 2px;
    padding: 12px 20px;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  #goBtn:active { opacity: 0.8; }

  .hint {
    text-align: center;
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 8px;
    line-height: 1.5;
  }

  .hint span {
    color: var(--gold);
  }

  /* Response bubble */
  #responseBubble {
    background: var(--panel);
    border-left: 3px solid var(--accent);
    border-radius: 0 10px 10px 0;
    padding: 10px 14px;
    font-size: 0.95rem;
    color: var(--gold);
    min-height: 40px;
    margin-bottom: 16px;
    line-height: 1.4;
    display: none;
  }

  #responseBubble.visible { display: block; }
  #responseBubble.success { border-left-color: var(--green); color: var(--green); }
  #responseBubble.error { border-left-color: #f87171; color: #f87171; }

  /* Commands help */
  .commands {
    background: var(--panel);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 20px;
    border: 1px solid rgba(255,255,255,0.05);
  }

  .commands-title {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .cmd-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .cmd-chip {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 0.75rem;
    color: var(--text);
  }

  /* State grid */
  .grid-title {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .states-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
  }

  .state-plate {
    background: var(--plate-bg);
    border: 2px solid var(--plate-border);
    border-radius: 6px;
    padding: 6px 4px;
    text-align: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 1px;
    color: var(--plate-border);
    position: relative;
    transition: all 0.3s ease;
    cursor: pointer;
    user-select: none;
  }

  .state-plate::before {
    content: '';
    position: absolute;
    top: 2px; left: 2px; right: 2px;
    height: 2px;
    background: var(--plate-border);
    opacity: 0.3;
    border-radius: 1px;
  }

  .state-plate.found {
    background: #1f2937;
    border-color: #374151;
    color: #374151;
    text-decoration: line-through;
    opacity: 0.45;
    transform: scale(0.95);
  }

  .state-plate.just-found {
    animation: foundFlash 0.6s ease forwards;
  }

  @keyframes foundFlash {
    0%   { background: var(--green); border-color: var(--green); color: white; transform: scale(1.08); opacity: 1; }
    100% { background: #1f2937; border-color: #374151; color: #374151; transform: scale(0.95); opacity: 0.45; }
  }

  #micBtn {
    background: var(--panel);
    border: 2px solid var(--muted);
    border-radius: 10px;
    color: var(--muted);
    font-size: 1.4rem;
    padding: 0 14px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #micBtn.listening {
    border-color: var(--accent);
    color: var(--accent);
    animation: pulse 1s infinite;
  }

  #micBtn.unsupported {
    opacity: 0.3;
    cursor: not-allowed;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(233,69,96,0.4); }
    50% { box-shadow: 0 0 0 8px rgba(233,69,96,0); }
  }

  /* Startup modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 24px;
  }
  .modal-overlay.hidden { display: none; }
  .modal-box {
    background: var(--panel);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 28px 24px;
    text-align: center;
    max-width: 340px;
    width: 100%;
  }
  .modal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    letter-spacing: 3px;
    color: var(--gold);
    margin-bottom: 8px;
  }
  .modal-sub {
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 20px;
    line-height: 1.5;
  }
  .modal-saved-info {
    background: rgba(255,255,255,0.05);
    border-radius: 10px;
    padding: 10px 14px;
    margin-bottom: 20px;
    font-size: 0.9rem;
    color: var(--text);
  }
  .modal-saved-info span {
    color: var(--green);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
  }
  .modal-btn {
    display: block;
    width: 100%;
    padding: 13px;
    border-radius: 10px;
    font-family: 'Oswald', sans-serif;
    font-size: 1rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    border: none;
    margin-bottom: 10px;
    transition: opacity 0.2s;
  }
  .modal-btn:active { opacity: 0.8; }
  .modal-btn.primary { background: var(--green); color: white; }
  .modal-btn.secondary {
    background: transparent;
    border: 2px solid var(--muted);
    color: var(--muted);
  }

  #resetBtn {
    display: block;
    width: 100%;
    margin-top: 20px;
    padding: 12px;
    background: transparent;
    border: 2px solid var(--muted);
    border-radius: 10px;
    color: var(--muted);
    font-family: 'Oswald', sans-serif;
    font-size: 1rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }

  #resetBtn:hover, #resetBtn:active {
    border-color: var(--accent);
    color: var(--accent);
  }
</style>
</head>
<body>

<!-- Startup Modal -->
<div class="modal-overlay" id="startModal">
  <div class="modal-box">
    <div class="modal-title">🚗 Plate Spotter</div>
    <div class="modal-sub" id="modalSub"></div>
    <div class="modal-saved-info" id="modalInfo"></div>
    <button class="modal-btn primary" id="continueBtn">▶ Continue Game</button>
    <button class="modal-btn secondary" id="freshBtn">↺ Start Fresh</button>
  </div>
</div>

<h1>🚗 Plate Spotter</h1>
<p class="subtitle">License Plate Road Trip Game</p>

<div class="stats-bar">
  <div class="stat">
    <div class="stat-num remaining" id="remainCount">50</div>
    <div class="stat-label">Remaining</div>
  </div>
  <div class="stat">
    <div class="stat-num found" id="foundCount">0</div>
    <div class="stat-label">Found</div>
  </div>
</div>

<div class="voice-section">
  <div class="voice-label">Say a command</div>
  <div class="input-row">
    <input type="text" id="cmdInput" placeholder='e.g. "Texas"' autocomplete="off" autocorrect="off" spellcheck="false" />
    <button id="micBtn" title="Tap to speak">🎤</button>
    <button id="goBtn">GO</button>
  </div>
  <div class="hint" id="micHint">Tap 🎤 to speak a state name, or type and tap GO</div>
</div>

<div id="responseBubble"></div>

<div class="commands">
  <div class="commands-title">Commands</div>
  <div class="cmd-list">
    <span class="cmd-chip">"Remove Texas"</span>
    <span class="cmd-chip">"Found Ohio"</span>
    <span class="cmd-chip">"Spotted Illinois"</span>
    <span class="cmd-chip">"How many remain?"</span>
    <span class="cmd-chip">"Read remaining states"</span>
    <span class="cmd-chip">"Reset game"</span>
  </div>
</div>

<div class="grid-title">Tap any plate to mark it found</div>
<div class="states-grid" id="statesGrid"></div>
<button id="resetBtn">↺ Reset Game</button>

<script>
// ── Save/Load ──────────────────────────────────────────
const SAVE_KEY = 'plateSpotterSave';
function saveGame() {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify([...found])); } catch(e) {}
}
function loadSave() {
  try { const d = localStorage.getItem(SAVE_KEY); return d ? JSON.parse(d) : null; } catch(e) { return null; }
}
function clearSave() { try { localStorage.removeItem(SAVE_KEY); } catch(e) {} }

const ALL_STATES = [
  "Alabama","Alaska","Arizona","Arkansas","California","Colorado","Connecticut",
  "Delaware","Florida","Georgia","Hawaii","Idaho","Illinois","Indiana","Iowa",
  "Kansas","Kentucky","Louisiana","Maine","Maryland","Massachusetts","Michigan",
  "Minnesota","Mississippi","Missouri","Montana","Nebraska","Nevada","New Hampshire",
  "New Jersey","New Mexico","New York","North Carolina","North Dakota","Ohio",
  "Oklahoma","Oregon","Pennsylvania","Rhode Island","South Carolina","South Dakota",
  "Tennessee","Texas","Utah","Vermont","Virginia","Washington","West Virginia",
  "Wisconsin","Wyoming"
];

const ABBR = {
  "Alabama":"AL","Alaska":"AK","Arizona":"AZ","Arkansas":"AR","California":"CA",
  "Colorado":"CO","Connecticut":"CT","Delaware":"DE","Florida":"FL","Georgia":"GA",
  "Hawaii":"HI","Idaho":"ID","Illinois":"IL","Indiana":"IN","Iowa":"IA",
  "Kansas":"KS","Kentucky":"KY","Louisiana":"LA","Maine":"ME","Maryland":"MD",
  "Massachusetts":"MA","Michigan":"MI","Minnesota":"MN","Mississippi":"MS",
  "Missouri":"MO","Montana":"MT","Nebraska":"NE","Nevada":"NV","New Hampshire":"NH",
  "New Jersey":"NJ","New Mexico":"NM","New York":"NY","North Carolina":"NC",
  "North Dakota":"ND","Ohio":"OH","Oklahoma":"OK","Oregon":"OR","Pennsylvania":"PA",
  "Rhode Island":"RI","South Carolina":"SC","South Dakota":"SD","Tennessee":"TN",
  "Texas":"TX","Utah":"UT","Vermont":"VT","Virginia":"VA","Washington":"WA",
  "West Virginia":"WV","Wisconsin":"WI","Wyoming":"WY"
};

let found = new Set();

function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.rate = 0.95;
  window.speechSynthesis.speak(utt);
}

function showResponse(msg, type = '') {
  const el = document.getElementById('responseBubble');
  el.textContent = msg;
  el.className = 'visible ' + type;
}

function normalize(text) {
  return text.toLowerCase().replace(/[^a-z\s]/g, '').trim();
}

function findStateInText(text) {
  const norm = normalize(text);
  const sorted = [...ALL_STATES].sort((a, b) => b.length - a.length);
  for (const state of sorted) {
    if (norm.includes(normalize(state))) return state;
  }
  for (const [state, abbr] of Object.entries(ABBR)) {
    const re = new RegExp('\\b' + abbr.toLowerCase() + '\\b');
    if (re.test(norm)) return state;
  }
  return null;
}

function markFound(state, flash = false) {
  if (found.has(state)) return false;
  found.add(state);
  updatePlate(state, flash);
  updateStats();
  saveGame();
  return true;
}

function updatePlate(state, flash = false) {
  const plate = document.getElementById('plate-' + state.replace(/\s/g, '_'));
  if (!plate) return;
  if (found.has(state)) {
    plate.className = 'state-plate found' + (flash ? ' just-found' : '');
  } else {
    plate.className = 'state-plate';
  }
}

function updateStats() {
  document.getElementById('remainCount').textContent = 50 - found.size;
  document.getElementById('foundCount').textContent = found.size;
}

function processCommand(text) {
  if (!text.trim()) return;
  const norm = normalize(text);

  // How many remain
  if (norm.includes('how many') || norm.includes('count') || norm.includes('states remain') || norm.includes('how many left')) {
    const rem = 50 - found.size;
    const msg = rem === 0
      ? "You found all 50 states! Congratulations!"
      : `${rem} state${rem !== 1 ? 's' : ''} remain${rem === 1 ? 's' : ''}.`;
    speak(msg);
    showResponse(msg, 'success');
    return;
  }

  // Read remaining
  if (norm.includes('read') || norm.includes('list') || norm.includes('tell me') || (norm.includes('what') && norm.includes('remain'))) {
    const remaining = ALL_STATES.filter(s => !found.has(s));
    if (remaining.length === 0) {
      const msg = "You've found all 50 states!";
      speak(msg); showResponse(msg, 'success');
    } else if (remaining.length > 25) {
      const msg = `${remaining.length} states remain — too many to read aloud. Keep spotting!`;
      speak(msg); showResponse(msg);
    } else {
      const msg = `${remaining.length} states remain: ${remaining.join(', ')}.`;
      speak(msg); showResponse(msg, 'success');
    }
    return;
  }

  // Reset
  if (norm.includes('reset') || norm.includes('start over') || norm.includes('new game')) {
    found.clear();
    clearSave();
    buildGrid();
    updateStats();
    const msg = "Game reset! All 50 states back on the list.";
    speak(msg); showResponse(msg, 'success');
    return;
  }

  // Remove / found / spotted
  if (norm.includes('remove') || norm.includes('found') || norm.includes('spotted') ||
      norm.includes('got') || norm.includes('mark') || norm.includes('cross') ||
      norm.includes('check') || norm.includes('delete') || norm.includes('saw')) {
    const state = findStateInText(text);
    if (state) {
      if (found.has(state)) {
        const msg = `${state} is already marked.`;
        speak(msg); showResponse(msg, 'error');
      } else {
        markFound(state, true);
        const rem = 50 - found.size;
        const msg = `✓ ${state} spotted! ${rem} state${rem !== 1 ? 's' : ''} remain.`;
        speak(`${state} spotted! ${rem} states remain.`);
        showResponse(msg, 'success');
      }
    } else {
      const msg = "I didn't catch a state name. Try: Remove Texas";
      speak(msg); showResponse(msg, 'error');
    }
    return;
  }

  // Just a state name by itself
  const state = findStateInText(text);
  if (state) {
    if (found.has(state)) {
      const msg = `${state} is already marked.`;
      speak(msg); showResponse(msg, 'error');
    } else {
      markFound(state, true);
      const rem = 50 - found.size;
      const msg = `✓ ${state} spotted! ${rem} state${rem !== 1 ? 's' : ''} remain.`;
      speak(`${state} spotted! ${rem} states remain.`);
      showResponse(msg, 'success');
    }
    return;
  }

  const msg = "Command not recognized. Try: Remove Texas, How many remain, or Read remaining states.";
  speak(msg); showResponse(msg, 'error');
}

function buildGrid() {
  const grid = document.getElementById('statesGrid');
  grid.innerHTML = '';
  ALL_STATES.forEach(state => {
    const plate = document.createElement('div');
    plate.className = 'state-plate' + (found.has(state) ? ' found' : '');
    plate.id = 'plate-' + state.replace(/\s/g, '_');
    plate.innerHTML = `<div>${ABBR[state]}</div><div style="font-size:0.6rem;font-family:'Oswald',sans-serif;font-weight:300;letter-spacing:0.5px;opacity:0.8">${state}</div>`;
    plate.addEventListener('click', () => {
      if (found.has(state)) {
        found.delete(state);
        updatePlate(state);
        updateStats();
        saveGame();
        showResponse(`${state} restored.`, '');
      } else {
        markFound(state, true);
        const rem = 50 - found.size;
        const msg = `✓ ${state} spotted! ${rem} remain.`;
        speak(`${state} spotted!`);
        showResponse(msg, 'success');
      }
    });
    grid.appendChild(plate);
  });
}

// Input handling
const cmdInput = document.getElementById('cmdInput');
const goBtn = document.getElementById('goBtn');
const micBtn = document.getElementById('micBtn');

function submitCommand() {
  const val = cmdInput.value.trim();
  if (val) {
    processCommand(val);
    cmdInput.value = '';
  }
}

goBtn.addEventListener('click', submitCommand);
cmdInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') submitCommand();
});

// ── Web Speech API mic button ──────────────────────────
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;
let listening = false;

if (SpeechRecognition) {
  recognition = new SpeechRecognition();
  recognition.lang = 'en-US';
  recognition.continuous = false;
  recognition.interimResults = false;

  recognition.onstart = () => {
    listening = true;
    micBtn.classList.add('listening');
    micBtn.textContent = '🔴';
    showResponse('Listening…', '');
  };

  recognition.onresult = (e) => {
    const transcript = e.results[0][0].transcript;
    cmdInput.value = transcript;
    processCommand(transcript);
    cmdInput.value = '';
  };

  recognition.onerror = (e) => {
    let msg = 'Mic error.';
    if (e.error === 'not-allowed') msg = 'Mic permission denied. Allow microphone access in Chrome settings.';
    else if (e.error === 'no-speech') msg = 'No speech detected. Try again.';
    showResponse(msg, 'error');
  };

  recognition.onend = () => {
    listening = false;
    micBtn.classList.remove('listening');
    micBtn.textContent = '🎤';
  };

  micBtn.addEventListener('click', () => {
    if (listening) {
      recognition.stop();
    } else {
      try { recognition.start(); }
      catch(e) { showResponse('Could not start mic. Try again.', 'error'); }
    }
  });
} else {
  micBtn.classList.add('unsupported');
  micBtn.title = 'Speech recognition not supported in this browser';
  document.getElementById('micHint').innerHTML = 'Type a state name and tap <span style="color:var(--gold)">GO</span>';
}

// ── Reset button ───────────────────────────────────────
document.getElementById('resetBtn').addEventListener('click', () => {
  found.clear();
  clearSave();
  buildGrid();
  updateStats();
  showResponse('Game reset! All 50 states back on the list.', 'success');
});

// ── Startup modal ──────────────────────────────────────
const startModal = document.getElementById('startModal');
const savedStates = loadSave();

if (savedStates && savedStates.length > 0) {
  const remCount = 50 - savedStates.length;
  document.getElementById('modalSub').textContent = 'A saved game was found!';
  document.getElementById('modalInfo').innerHTML =
    `<span>${savedStates.length}</span> states found &nbsp;·&nbsp; <span>${remCount}</span> remaining`;

  document.getElementById('continueBtn').addEventListener('click', () => {
    found = new Set(savedStates);
    buildGrid();
    updateStats();
    startModal.classList.add('hidden');
    showResponse(`Welcome back! ${remCount} state${remCount !== 1 ? 's' : ''} to go.`, 'success');
  });
} else {
  document.getElementById('modalSub').textContent = 'Ready to hit the road?';
  document.getElementById('modalInfo').style.display = 'none';
  document.getElementById('continueBtn').style.display = 'none';
}

document.getElementById('freshBtn').addEventListener('click', () => {
  found = new Set();
  clearSave();
  buildGrid();
  updateStats();
  startModal.classList.add('hidden');
});

buildGrid();
updateStats();
</script>
</body>
</html>
